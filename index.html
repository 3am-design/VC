<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vincent Portfolio</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Inter 字體 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    
    /* 隱藏捲軸但保持滾動能力，防止過渡動畫時畫面跳動 */
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
    }

    /* Blur + Fade In 動畫 */
    @keyframes blurFadeIn {
      0% { filter: blur(15px); opacity: 0; transform: scale(1.05); }
      100% { filter: blur(0px); opacity: 1; transform: scale(1); }
    }
    .animate-blur-fade-in {
      animation: blurFadeIn 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0;
    }

    /* 確保 SVG 圖形唔會阻礙點擊 */
    .pointer-events-none { pointer-events: none; }
    .pointer-events-auto { pointer-events: auto; }
  </style>

  <!-- 引入 React 同 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 來解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 用 Babel 編譯嘅 React 代碼 -->
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // --- 生成 100 角細密爆花 SVG Path 嘅 Helper Function ---
    const getStarburstPath = (points, outer, inner) => {
      let path = '';
      const center = 50;
      for (let i = 0; i < points * 2; i++) {
        const radius = i % 2 === 0 ? outer : inner;
        const angle = (Math.PI * i) / points;
        const x = center + radius * Math.cos(angle);
        const y = center + radius * Math.sin(angle);
        path += `${i === 0 ? 'M' : 'L'} ${x} ${y} `;
      }
      return path + 'Z';
    };

    // --- Backend / CMS 專屬嘅真實感 Error Messages ---
    const backendErrorsList = [
      "502 Bad Gateway: Upstream API /v1/auth failed to respond.",
      "MongoDB Timeout: Exceeded 10000ms waiting for connection pool.",
      "GraphQL Error: Field 'secure_payload' is not defined by type CMS_Query.",
      "Redis Cache Miss: Unable to retrieve session for key 'sess:xyz_992'.",
      "CORS Policy: No 'Access-Control-Allow-Origin' header present.",
      "AWS S3 Access Denied: Invalid IAM role permissions for bucket 'cms-assets'.",
      "PostgreSQL FATAL: too many clients already.",
      "JWT Signature Invalid: Token verification failed at middleware."
    ];

    // --- Canvas 粒子特效組件 (二進制 1010 版本) ---
    const ParticleText = () => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let animationFrameId;
        let particlesArray = [];
        
        let mouse = {
          x: null,
          y: null,
          radius: 120 
        };

        const handleMouseMove = (event) => {
          mouse.x = event.clientX;
          mouse.y = event.clientY;
        };

        window.addEventListener('mousemove', handleMouseMove);

        class Particle {
          constructor(x, y, gap, isMobile) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.originX = x;
            this.originY = y;
            this.size = gap;
            this.char = Math.random() > 0.5 ? '1' : '0';
            this.vx = 0;
            this.vy = 0;
            this.ease = 0.03 + Math.random() * 0.03; 
            this.friction = 0.8; 
            this.isMobile = isMobile;
          }

          draw() {
            ctx.fillStyle = 'white';
            const weight = this.isMobile ? 'bold' : 'normal';
            const multiplier = this.isMobile ? 1.5 : 1.2;
            ctx.font = `${weight} ${this.size * multiplier}px monospace`; 
            ctx.fillText(this.char, this.x, this.y);
          }

          update() {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.hypot(dx, dy);
            
            if (distance < mouse.radius) {
              let force = -mouse.radius / distance;
              let angle = Math.atan2(dy, dx);
              this.vx += force * Math.cos(angle);
              this.vy += force * Math.sin(angle);
            }

            this.x += (this.vx *= this.friction) + (this.originX - this.x) * this.ease;
            this.y += (this.vy *= this.friction) + (this.originY - this.y) * this.ease;
          }
        }

        const init = () => {
          particlesArray = [];
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;

          const isMobile = canvas.width < 768;
          const lines = isMobile ? ["HELLO.", "I AM", "VINCENT."] : ["HELLO.", "I AM VINCENT."];
          
          ctx.font = '900 100px "Arial Black", sans-serif'; 
          
          let maxTextWidth = 0;
          lines.forEach(line => {
            const w = ctx.measureText(line).width;
            if (w > maxTextWidth) maxTextWidth = w;
          });

          const scale = (canvas.width * 0.85) / maxTextWidth;
          let fontSize = Math.floor(100 * scale);
          
          const lineHeight = fontSize * 1.05;
          const totalHeight = lineHeight * lines.length;
          if (totalHeight > canvas.height * 0.85) {
            fontSize = Math.floor((canvas.height * 0.85) / (lines.length * 1.05));
          }

          ctx.font = `900 ${fontSize}px "Arial Black", sans-serif`;
          ctx.fillStyle = 'white';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          
          const startY = canvas.height / 2 - (fontSize * 1.05 * (lines.length - 1)) / 2;
          
          lines.forEach((line, index) => {
            ctx.fillText(line, canvas.width / 2, startY + index * fontSize * 1.05);
          });

          const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = textCoordinates.data;
          
          ctx.clearRect(0, 0, canvas.width, canvas.height); 
          
          const gap = 8; 
          for (let y = 0; y < canvas.height; y += gap) {
            for (let x = 0; x < canvas.width; x += gap) {
              const index = (y * canvas.width + x) * 4;
              const alpha = data[index + 3]; 
              if (alpha > 128) { 
                particlesArray.push(new Particle(x, y, gap, isMobile));
              }
            }
          }
        };

        const animate = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          for (let i = 0; i < particlesArray.length; i++) {
            if (Math.random() > 0.98) {
              particlesArray[i].char = particlesArray[i].char === '1' ? '0' : '1';
            }
            particlesArray[i].draw();
            particlesArray[i].update();
          }
          animationFrameId = requestAnimationFrame(animate);
        };

        init();
        animate();

        const handleResize = () => {
          init();
        };
        window.addEventListener('resize', handleResize);

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('resize', handleResize);
        };
      }, []);

      return (
        <canvas 
          ref={canvasRef} 
          className="block w-full h-full bg-black cursor-crosshair animate-blur-fade-in" 
          style={{ animationDelay: '0.3s' }}
        />
      );
    };


    // --- 主程式組件 ---
    const App = () => {
      const [isSystemFixed, setIsSystemFixed] = useState(false);
      const [isTransitioning, setIsTransitioning] = useState(false); 
      const [errors, setErrors] = useState([]);

      useEffect(() => {
        if (!isSystemFixed) {
          const isMobile = window.innerWidth < 768;
          const numErrors = isMobile ? 4 : 8; 
          
          const initialErrors = Array.from({ length: numErrors }).map((_, index) => {
            const randomMsg = backendErrorsList[Math.floor(Math.random() * backendErrorsList.length)];
            return {
              id: index,
              x: isMobile ? Math.floor(Math.random() * 8) + 2 : Math.floor(Math.random() * 50) + 10,
              y: isMobile ? Math.floor(Math.random() * 50) + 10 : Math.floor(Math.random() * 60) + 10,
              visible: true,
              message: randomMsg
            };
          });
          setErrors(initialErrors);
        }
      }, [isSystemFixed]);

      const handleFixError = useCallback((id) => {
        setErrors(prev => prev.map(err => err.id === id ? { ...err, visible: false } : err));

        setTimeout(() => {
          setErrors(prev => {
            if (isSystemFixed) return prev;
            return prev.map(err => {
              if (err.id === id) {
                const isMobile = window.innerWidth < 768;
                const newMsg = backendErrorsList[Math.floor(Math.random() * backendErrorsList.length)];
                return {
                  ...err,
                  visible: true,
                  message: newMsg,
                  x: isMobile ? Math.floor(Math.random() * 8) + 2 : Math.floor(Math.random() * 50) + 10,
                  y: isMobile ? Math.floor(Math.random() * 50) + 10 : Math.floor(Math.random() * 60) + 10,
                };
              }
              return err;
            });
          });
        }, 1500); 
      }, [isSystemFixed]);

      const callVincent = () => {
        setIsTransitioning(true);
        setTimeout(() => {
          setIsSystemFixed(true);
          setErrors([]);
          setIsTransitioning(false); 
        }, 800); 
      };

      if (isSystemFixed) {
        return (
          <div className="relative w-screen h-screen bg-black overflow-hidden duration-1000">
            <nav className="absolute top-0 w-full flex justify-end p-6 md:p-8 space-x-6 md:space-x-8 text-xs md:text-sm tracking-widest uppercase text-white z-10 mix-blend-difference font-bold font-mono">
              <a href="#work" className="md:hover:opacity-50 active:opacity-50 transition-opacity">Work</a>
              <a href="#about" className="md:hover:opacity-50 active:opacity-50 transition-opacity">About</a>
              <a href="#contact" className="md:hover:opacity-50 active:opacity-50 transition-opacity">Contact</a>
            </nav>
            <ParticleText />
          </div>
        );
      }

      return (
        <div className="relative min-h-screen bg-black overflow-hidden font-sans text-white pb-24 md:pb-0">
          <div 
            className={`fixed bottom-0 left-0 w-full bg-[#ccff00] z-[100] transition-all duration-700 ease-[cubic-bezier(0.76,0,0.24,1)] ${isTransitioning ? 'h-screen' : 'h-0'}`}
          />

          <div className="absolute inset-0 pointer-events-none bg-[linear-gradient(to_right,#ffffff1a_1px,transparent_1px),linear-gradient(to_bottom,#ffffff1a_1px,transparent_1px)] bg-[size:8px_8px]"></div>

          {errors.map((err) => (
            err.visible && (
              <div
                key={err.id}
                className="absolute z-10 w-[85vw] md:w-80 bg-[#0a0a0a] border border-gray-700 rounded-lg shadow-2xl overflow-hidden duration-150"
                style={{ top: `${err.y}%`, left: `${err.x}%`, animation: 'zoomIn 0.15s ease-out' }}
              >
                <div className="bg-[#1a1a1a] border-b border-gray-800 px-4 py-2.5 flex items-center relative">
                  <div className="flex space-x-2 absolute left-4">
                    <button
                      onClick={() => handleFixError(err.id)}
                      className="w-3 h-3 bg-[#ff5f56] md:hover:bg-red-400 active:bg-red-400 rounded-full transition-colors focus:outline-none cursor-pointer"
                      title="Close and Fix"
                    ></button>
                  </div>
                  <span className="w-full text-center text-[10px] font-mono text-gray-500 tracking-widest uppercase truncate px-8">
                    sys_err_{err.id}.log
                  </span>
                </div>
                <div className="p-5">
                  <p className="text-xs font-mono text-gray-300 break-words leading-relaxed mb-4">
                    <span className="text-red-500 mr-2">›</span>
                    {err.message}
                  </p>
                  <div className="flex justify-end">
                    <button
                      onClick={() => handleFixError(err.id)}
                      className="bg-white text-black md:hover:bg-[#ccff00] active:bg-[#ccff00] px-4 py-1.5 font-bold font-mono text-xs uppercase transition-colors rounded-sm shadow-sm"
                    >
                      Force Fix
                    </button>
                  </div>
                </div>
              </div>
            )
          ))}

          {/* MOBILE CTA */}
          <div className="md:hidden fixed bottom-0 left-0 w-full z-50">
            <button
              onClick={callVincent}
              className="w-full bg-[#ccff00] text-black active:bg-[#b3e600] py-5 flex flex-col items-center justify-center border-t border-[#ccff00] transition-colors duration-200 outline-none"
            >
              <span className="font-black text-3xl tracking-tighter" style={{ fontFamily: '"Inter", sans-serif', letterSpacing: '0.02em' }}>
                FIND VINCENT
              </span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1265 512" className="w-32 h-auto mt-1 fill-current text-black">
                <path d="M1168.44,264l-1160.44-.33c-4.42,0-8-3.58-8-8s3.58-8,8-8l1160.45.33c4.42,0,8,3.58,8,8s-3.58,8-8,8h0Z"/>
                <path d="M1265,256.1c-45.45,16.8-101.85,45.54-136.8,76l27.57-76.1-27.46-76.1c34.92,30.5,91.27,59.3,136.7,76.2Z"/>
              </svg>
            </button>
          </div>

          {/* DESKTOP CTA */}
          <div className="hidden md:block fixed bottom-0 right-0 z-50 transform translate-x-1/2 translate-y-1/2 pointer-events-none">
            <button
              onClick={callVincent}
              className="relative w-[450px] h-[450px] md:w-[650px] md:h-[650px] pointer-events-auto cursor-pointer group outline-none rounded-full"
            >
              <div className="absolute inset-0 transition-transform duration-1000 ease-in-out group-hover:scale-[25] origin-center pointer-events-none">
                <svg 
                  viewBox="0 0 100 100" 
                  className="w-full h-full text-[#2B2B2B] group-hover:text-[#ccff00] transition-colors duration-1000 fill-current animate-[spin_60s_linear_infinite]"
                >
                  <path d={getStarburstPath(100, 50, 48.5)} />
                </svg>
              </div>
              
              <div className="absolute top-0 left-0 w-1/2 h-1/2 flex items-end justify-end pb-[10%] pr-[12%] pointer-events-none">
                <div className="flex flex-col items-center justify-center select-none w-max group-active:scale-95 transition-transform z-10">
                  <span 
                    className="text-white group-hover:text-black transition-colors duration-500 w-full text-center"
                    style={{ fontFamily: '"Inter", sans-serif', fontWeight: 900, fontSize: 'clamp(28px, 4vw, 54px)', lineHeight: 1, letterSpacing: '0.02em' }}
                  >
                    FIND
                  </span>
                  <span 
                    className="text-white group-hover:text-black transition-colors duration-500 w-full text-center mt-1"
                    style={{ fontFamily: '"Inter", sans-serif', fontWeight: 900, fontSize: 'clamp(28px, 4vw, 54px)', lineHeight: 1, letterSpacing: '0.02em' }}
                  >
                    VINCENT
                  </span>
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1265 512" className="w-[96%] h-auto mt-2 text-[#ccff00] group-hover:text-black transition-colors duration-500 fill-current">
                    <path d="M1168.44,264l-1160.44-.33c-4.42,0-8-3.58-8-8s3.58-8,8-8l1160.45.33c4.42,0,8,3.58,8,8s-3.58,8-8,8h0Z"/>
                    <path d="M1265,256.1c-45.45,16.8-101.85,45.54-136.8,76l27.57-76.1-27.46-76.1c34.92,30.5,91.27,59.3,136.7,76.2Z"/>
                  </svg>
                </div>
              </div>
            </button>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</body>
</html>
